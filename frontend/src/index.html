<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIS Navigation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header-title">
            <img src="icons/kis.png" alt="KIS Logo" class="logo">
            <h1>Korea International School</h1>
        </div>
        <div class="navigation-panel">
            <h2 class="nav-title">Navigation</h2>
            <div class="nav-field">
                <label for="startSelect">Start:</label>
                <select id="startSelect">
                    <option value="">-- Select Start --</option>
                </select>
            </div>
            <div class="nav-field">
                <label for="destSelect">Destination:</label>
                <select id="destSelect">
                    <option value="">-- Select Destination --</option>
                </select>
            </div>
            <div class="button-group">
                <button id="navigateBtn">Navigate</button>
                <button id="doneBtn">Done</button>
            </div>
        </div>
        <div class="map-container">
            <canvas id="mapCanvas"></canvas>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
